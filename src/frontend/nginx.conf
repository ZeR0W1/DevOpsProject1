server {
    listen 80;
    server_name 44.212.221.75;

    root /home/ec2-user/infra-automation/src/frontend;
    index index2.html;

    location = / {
        try_files /index2.html =404;
    }

    location / {
        try_files $uri $uri/ /index2.html;
    }

    location /health {
        proxy_pass http://10.0.149.9:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /machines {
        proxy_pass http://10.0.149.9:8000/machines;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /schema/ {
        proxy_pass http://10.0.149.9:8000/schema/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}